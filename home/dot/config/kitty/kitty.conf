#############
### Fonts ###
#############
font_family JetBrainsMono

# HP
# font_size 9
# ASUS
font_size 11.25




#####################
### Terminal Bell ###
#####################
enable_audio_bell no





###############
### Tab Bar ###
###############
# # Powerline-style Tab Bar
# tab_bar_edge bottom
# tab_bar_style powerline
# tab_powerline_style angled
# tab_bar_align left
