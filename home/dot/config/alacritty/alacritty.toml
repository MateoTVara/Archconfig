[window]
padding = { x = 0, y = 0 }
dynamic_padding = true
decorations = "None"
resize_increments = true

[font]
normal = {
  family = "JetBrainsMono" 
}
size = 11.25

[colors]
[colors.primary]
foreground = "#C1C7DB"
background = "#282B34"

[keyboard]
[[keyboard.bindings]]
key = "Back"
mods = "Control"
chars = "\u0017"
